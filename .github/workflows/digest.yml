name: digest

on:
  schedule:
    - cron: "55 20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python agent.py --digest
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      - name: Commit state
        run: |
          git config user.name "rf-signal-agent"
          git config user.email "rf-signal-agent@users.noreply.github.com"
          git add state.json
          git commit -m "digest state" || exit 0
          git push
